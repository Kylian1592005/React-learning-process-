<!doctype html>
<html>
  <head>
    <title>Ex-4.2</title>
  </head>
  <style>
    input {
      margin-bottom: 10px;
      padding: 5px;
      margin-right: 5px;
    }
    .btn {
      background-color: rgb(0, 123, 255);
      padding: 10px 15px;
      font-size: 15px;
      border: none;
      color: white;
      border-radius: 10px;
      margin-right: 10px;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function LoginForm() {
        const [showPassword, setShowPassword] = React.useState(true);
        function passwordShowHide() {
          setShowPassword(!showPassword);
        }

        return (
          <>
            <h1>Hello, Welcome to my website.</h1>
            <div><input placeholder="Email" type="password"/></div>
            <div>
              <input placeholder="Password" type={showPassword === true? "password":"text"}/>
              <button onClick={passwordShowHide}>{showPassword === true ? "Show" : "Hide"}</button>
            </div>
            <button className="btn">Login </button>
            <button className="btn">Sign up</button>
          </>
        );
      }
      function App() {
        return (
          <LoginForm />
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
