<!doctype html>
<html>
  <head>
    <title>Ex-2.2</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({ name, price, discountPrice, imgSrc}) {
        return (
          <div> 
            <img src={imgSrc} alt={name} />
            <p>{ name }</p>
            {discountPrice ? (
                <div>   
                  <del>Price: ${ price }</del>
                  <p>Discount Price: ${discountPrice}</p>
                </div>
              ):(<p>Price: ${ price }</p>)
            }
            <button>Add to Cart</button>
          </div>
        );
      }
      function App() {
        return (
          <>
            <ProductDetails name="Cotton Socks" price="10.90" discountPrice="5.45" imgSrc="img/sock.png" />
            <ProductDetails name="Tennis Balls" price="6.90" imgSrc="img/tennis.png" />
            <ProductDetails name="Plain T-shirts" price="7.99" imgSrc="img/shirt.png" />
          </>
        );
      }
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
