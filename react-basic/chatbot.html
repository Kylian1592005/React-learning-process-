<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <style>
    * {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
    }

    button {
      background-color: rgb(25, 135, 84);
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      margin-left: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .chat-input {
      padding: 10px 15px;
      border-radius: 10px;
      border-width: 1px;
      font-size: 15px;
      flex-grow: 1;
    }

    .chat-input-container {
      display: flex;
      margin-bottom: 60px;
    }

    .app-container {
      max-width: 600px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-message-user {
      display: flex;
      justify-content: end;
      align-items: start;
    }

    .chat-message-text {
      background-color: rgb(238, 238, 238);
      padding: 15px 20px;
      border-radius: 10px;
      margin: 0 20px 10px;
      max-width: 300px;
    }

    .chat-message-robot {
      display: flex;
      align-items: start;
    }

    .chat-message-profile {
      width: 45px;
    }

    .chat-message-container {
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;
    }

    .para {
      justify-content: center;
      margin-bottom: 20px;
      opacity: .5;
    }
  </style>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

      const loadingImg = "https://supersimple.dev/images/loading-spinner.gif";

      // Custom Hook for Auto-Scroll
      function useAutoScroll(dependencies) {
        const ref = React.useRef(null);
        React.useEffect(() => {
          const containerElm = ref.current;
          if(containerElm) {
            containerElm.scrollTop = containerElm.scrollHeight;
          }
        }, dependencies);
        return ref;
      }

      function ChatInput({ chatMessage, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(e) {
          setInputText(e.target.value);
        }

        async function sendMessage() {
          if (isLoading || !inputText.trim()) return;

          const text = inputText;
          setInputText('');
          setIsLoading(true);

          const newChatMessage = [
            ...chatMessage,
            { message: text, sender: 'user', id: crypto.randomUUID() }
          ];

          // Show loading spinner
          setChatMessages([
            ...newChatMessage,
            { 
              message: <img src={loadingImg} style={{ height: "40px", margin: "-15px" }} />,
              sender: "robot",
              id: "loading" 
            }
          ]);

          const response = await Chatbot.getResponseAsync(text);

          // Replace loading with real response
          setChatMessages([
            ...newChatMessage,
            { message: response, sender: 'robot', id: crypto.randomUUID() }
          ]);

          setIsLoading(false);
        }

        function onKeyDown(e) {
          if (e.key === "Enter") sendMessage();
          if (e.key === "Escape") setInputText('');
        }

        return (
          <div class="chat-input-container">
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              value={inputText}
              onChange={saveInputText}
              onKeyDown={onKeyDown}
              disabled={isLoading}
              class="chat-input"
            />
            <button onClick={sendMessage} disabled={isLoading}>
              Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div class={sender === "user" ? "chat-message-user" : "chat-message-robot"}>
            {sender === "robot" && <img src="img/robot.png" class="chat-message-profile" />}
            <div class="chat-message-text">
              {typeof message === "string" ? message : message}
            </div>
            {sender === "user" && <img src="img/user.png" class="chat-message-profile" />}
          </div>
        );
      }

      function ChatMessages({ chatMessage }) {
        // Use the custom hook for auto-scroll
        const chatMessageRef = useAutoScroll([chatMessage]);

        return (
          <div class="chat-message-container" ref={chatMessageRef}>
            {chatMessage.map((chat) => (
              <ChatMessage
                message={chat.message}
                sender={chat.sender}
                key={chat.id}
              />
            ))}
          </div>
        );
      }

      function App() {
        const [chatMessage, setChatMessages] = React.useState([]);

        return (
          <div class="app-container">
            <ChatMessages chatMessage={chatMessage} />
            {chatMessage.length === 0 && (
              <p class="para">
                Welcome to the chatbot project! Send a message using the textbox below.
              </p>
            )}
            <ChatInput
              chatMessage={chatMessage}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
